<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sprint Dashboard — Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#eef0f4;
  --surface:#fff;
  --surface2:#f6f7f9;
  --border:#e2e5eb;
  --border-strong:#cdd2db;
  --text-primary:#1a1d23;
  --text-secondary:#5c6370;
  --text-muted:#9099a8;

  --status-running:#dbeafe;   --status-running-b:#93c5fd;
  --status-waiting:#fef9c3;   --status-waiting-b:#fde047;
  --status-rejected:#fee2e2;  --status-rejected-b:#fca5a5;
  --status-other:#f1f3f5;     --status-other-b:#d1d5db;
  --status-done:#dcfce7;      --status-done-b:#86efac;

  --accent:#6366f1;
  --sprint-today-bg:#f0fdf4;
  --sprint-today-border:#86efac;

  --col-dev:190px;
  --card-r:5px;
  --sh-card:0 1px 3px rgba(0,0,0,.07);
  --sh-hover:0 3px 12px rgba(0,0,0,.13);
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh}

/* ══ HEADER ══ */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;height:52px;display:flex;align-items:center;
  position:sticky;top:0;z-index:300;
}
.hdr-center{flex:1;display:flex;align-items:center;justify-content:center;gap:9px}
.logo-mark{
  width:30px;height:30px;background:var(--accent);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;flex-shrink:0;
}
header h1{font-size:17px;font-weight:600;letter-spacing:-.3px;white-space:nowrap}
header h1 span{color:var(--text-muted);font-weight:400}
.hdr-right{position:absolute;right:20px;display:flex;align-items:center;gap:7px}
.last-updated{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace}
.reload-btn{
  display:flex;align-items:center;gap:3px;padding:3px 10px;
  border-radius:5px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text-secondary);
  font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s;
}
.reload-btn:hover{background:var(--surface2);color:var(--text-primary)}
.reload-btn:disabled{opacity:.5;cursor:default}

/* ══ TOOLBAR ══ */
.toolbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:6px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.toolbar-label{font-size:10.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.sprint-filters{display:flex;gap:5px;flex-wrap:wrap}
.sprint-btn{
  padding:2px 11px;border-radius:20px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text-secondary);font-size:11px;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s;white-space:nowrap;
}
.sprint-btn:hover{background:var(--surface2)}
.sprint-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* ══ BOARD ══ */
.board-wrap{padding:12px 20px 32px;display:flex;flex-direction:column;gap:12px}

/* ── Sprint block ── */
.sprint-block{
  border-radius:9px;border:1px solid var(--border);
  background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.04);
  overflow:hidden;
}
.sprint-block.is-current{
  border-color:var(--sprint-today-border);
  box-shadow:0 0 0 2px rgba(134,239,172,.2),0 1px 4px rgba(0,0,0,.04);
}
.sprint-block.hidden{display:none}

/* ══ SPRINT INFO BAR — horizontal, no topo ══ */
.sprint-info-bar{
  display:flex;align-items:center;gap:0;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
  flex-wrap:nowrap;overflow:hidden;
}
.sprint-block.is-current .sprint-info-bar{background:var(--sprint-today-bg)}

/* 1. Identidade */
.si-identity{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px 7px 12px;
  border-right:1px solid var(--border);
  flex-shrink:0;min-width:175px;
}
.sprint-name{font-size:13px;font-weight:700;color:var(--text-primary);white-space:nowrap}
.current-badge{
  font-size:8.5px;background:#22c55e;color:#fff;
  padding:1px 6px;border-radius:10px;font-weight:600;white-space:nowrap;
}
.sprint-dates{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap}

/* 2. KPI pills */
.si-kpis{display:flex;align-items:center;padding:0 6px;border-right:1px solid var(--border);flex-shrink:0}
.kpi-pill{
  display:flex;align-items:center;gap:3px;
  padding:0 7px;height:34px;border-right:1px solid var(--border);white-space:nowrap;
}
.kpi-pill:last-child{border-right:none}
.kpi-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.kpi-text{font-size:10.5px;color:var(--text-secondary)}
.kpi-text strong{color:var(--text-primary);font-weight:600}

/* 3. Progresso total */
.si-progress{
  display:flex;align-items:center;gap:6px;
  padding:0 12px;
  flex-shrink:0;
}
.prog-title{font-size:9.5px;color:var(--text-muted);white-space:nowrap}
.prog-bar-h{width:80px;height:5px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.prog-pct{font-size:11px;font-family:'DM Mono',monospace;font-weight:700;white-space:nowrap}
.prog-health{font-size:10px;white-space:nowrap}
.info-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:14px;height:14px;border-radius:50%;
  background:var(--border);color:var(--text-muted);
  font-size:8.5px;cursor:help;flex-shrink:0;font-weight:700;
}
.info-icon:hover{background:var(--accent);color:#fff}

/* ══ SCROLL AREA ══ */
.sprint-scroll{overflow-x:auto;scroll-behavior:smooth}
.sprint-scroll::-webkit-scrollbar{height:4px}
.sprint-scroll::-webkit-scrollbar-track{background:var(--surface2)}
.sprint-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.sprint-scroll::-webkit-scrollbar-thumb:hover{background:#aab2be}

.sprint-cols{display:flex;min-width:max-content}

/* ── Coluna genérica ── */
.dev-col{
  width:var(--col-dev);min-width:var(--col-dev);
  flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;
}

/* ── Coluna de Projetos (mesma largura) ── */
.proj-col{width:190px;min-width:190px}

/* ── Dev / Proj header ── */
.dev-head{
  padding:6px 8px 5px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
  display:flex;flex-direction:column;gap:4px;
}
.dev-top-row{display:flex;align-items:center;gap:6px}
.dev-avatar{
  width:22px;height:22px;border-radius:50%;color:#fff;
  font-size:9.5px;font-weight:600;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dev-name{font-size:11px;font-weight:600;color:var(--text-primary);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.dev-count{font-size:9.5px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap}
.dev-chips{display:flex;gap:2px;flex-wrap:wrap}
.chip{font-size:8.5px;padding:1px 5px;border-radius:8px;font-weight:500;border:1px solid transparent;white-space:nowrap}
.chip-running {background:var(--status-running); border-color:var(--status-running-b); color:#1d4ed8}
.chip-waiting {background:var(--status-waiting); border-color:var(--status-waiting-b); color:#854d0e}
.chip-rejected{background:var(--status-rejected);border-color:var(--status-rejected-b);color:#b91c1c}
.chip-done    {background:var(--status-done);    border-color:var(--status-done-b);    color:#166534}
.chip-other   {background:var(--status-other);   border-color:var(--status-other-b);   color:#374151}
.dev-prog-row{display:flex;align-items:center;gap:5px}
.dev-prog-track{flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.dev-prog-fill{height:100%;border-radius:3px;transition:width .4s}
.dev-prog-pct{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;white-space:nowrap}

/* ── Cards area ── */
.dev-cards{padding:5px 5px 6px;display:flex;flex-direction:column;gap:3px;flex:1}

/* ── Task card ── */
.task-card{
  border-radius:var(--card-r);padding:5px 8px;box-shadow:var(--sh-card);
  cursor:pointer;transition:box-shadow .12s,transform .12s;
  border:1px solid transparent;display:flex;flex-direction:column;gap:1px;
}
.task-card:hover{box-shadow:var(--sh-hover);transform:translateY(-1px);z-index:2}
.task-card.status-running {background:var(--status-running); border-color:var(--status-running-b)}
.task-card.status-waiting {background:var(--status-waiting); border-color:var(--status-waiting-b)}
.task-card.status-rejected{background:var(--status-rejected);border-color:var(--status-rejected-b)}
.task-card.status-done    {background:var(--status-done);    border-color:var(--status-done-b)}
.task-card.status-other   {background:var(--status-other);   border-color:var(--status-other-b)}
.card-project{font-size:8.5px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;line-height:1}
.card-title{font-size:10.5px;font-weight:500;color:var(--text-primary);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(var(--col-dev) - 20px)}

/* ── Proj card ── */
.proj-card{
  background:var(--surface2)!important;border-color:var(--border)!important;
}
.proj-card:hover{background:#eef2ff!important;border-color:#a5b4fc!important}
.proj-card-name{font-size:10.5px;font-weight:600;color:var(--text-primary);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.proj-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.proj-card-count{font-size:9.5px;color:var(--text-muted);font-family:'DM Mono',monospace}
.proj-card-hint{font-size:9.5px;color:var(--accent);font-weight:600}

.empty-col{color:var(--text-muted);font-size:10px;text-align:center;padding:14px 6px;opacity:.4}

/* ══ TOOLTIP ══ */
.gtt{
  position:fixed;background:#1c1f26;color:#e5e7eb;
  padding:9px 12px;border-radius:8px;font-size:11px;line-height:1.5;max-width:310px;
  pointer-events:none;z-index:9999;opacity:0;transition:opacity .1s;
  box-shadow:0 8px 28px rgba(0,0,0,.32);
}
.gtt.on{opacity:1}
.tt-row{display:flex;gap:6px;margin-bottom:2px}
.tt-lbl{color:#6b7280;min-width:72px;font-size:10.5px;flex-shrink:0}
.tt-val{color:#e5e7eb;font-weight:500}
.tt-sep{border-top:1px solid rgba(255,255,255,.08);margin:5px 0}
.tt-hd{font-size:9.5px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}

/* ══ STATES ══ */
.state-overlay{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:10px;color:var(--text-muted);font-size:13px;padding:20px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:20px 24px;max-width:520px;width:100%;
}
.error-box h3{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:10px}
.error-box p{font-size:12.5px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
.error-box code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;font-family:'DM Mono',monospace;word-break:break-all}
.error-step{display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text-secondary)}
.error-step-n{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.retry-btn{
  margin-top:14px;padding:7px 18px;border-radius:7px;border:none;
  background:var(--accent);color:#fff;font-size:13px;font-weight:600;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s;
}
.retry-btn:hover{opacity:.85}
.proxy-status{font-size:11px;color:var(--text-muted);margin-top:10px;font-family:'DM Mono',monospace}

/* Avatar palette */
.av-0{background:#6366f1}.av-1{background:#0ea5e9}.av-2{background:#10b981}
.av-3{background:#f59e0b}.av-4{background:#ef4444}.av-5{background:#8b5cf6}
.av-6{background:#14b8a6}.av-7{background:#f97316}.av-8{background:#ec4899}
.av-9{background:#6d28d9}
</style>
</head>
<body>

<header>
  <div class="hdr-center">
    <div class="logo-mark">KB</div>
    <h1>Sprint Board <span>— Kanban View</span></h1>
  </div>
  <div class="hdr-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="reload-btn" id="reloadBtn" onclick="loadData()">↺ Atualizar</button>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Sprint</span>
  <div class="sprint-filters" id="sprintFilters"></div>
</div>

<div class="board-wrap" id="board">
  <div class="state-overlay"><div class="spinner"></div><span>Carregando dados…</span></div>
</div>

<div class="gtt" id="gtt"></div>

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
// ID confirmado via pubhtml: PACX-1vRYN5AW9FVnV62E5Ur4w-S-XXm5O3uP8jS-myDMaruKi2jq_xbQxl85D3k0zZzOfl5PsNVpapJga68U
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYN5AW9FVnV62E5Ur4w-S-XXm5O3uP8jS-myDMaruKi2jq_xbQxl85D3k0zZzOfl5PsNVpapJga68U/pub?output=csv';

// Estratégias de fetch em ordem — tenta cada uma até funcionar
// 1ª: fetch direto (funciona em algumas redes/navegadores sem bloqueio CORS)
// 2ª–5ª: proxies públicos de CORS como fallback
const PROXIES = [
  url => url,                                                                          // direto
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

const SPRINT_CONFIG = [
  { name:'Sprint 14', start:'30/03', end:'03/04' },
  { name:'Sprint 15', start:'06/04', end:'10/04' },
  { name:'Sprint 16', start:'13/04', end:'17/04' },
];

/*
  PROGRESSO PONDERADO — Agile Weighted Progress
  Peso por status (% de conclusão que cada estado representa):
    Ag. Início  → 0%   (trabalho não iniciado)
    Em execução → 40%  (ativo, parcialmente entregue)
    Rejeitada   → 0%   (sem valor, descartada)
    Outros      → 20%  (estado indefinido)
    Concluída   → 100% (entregue)
  Fórmula: Σ(peso_i) / N × 100
*/
const W = {
  'status-waiting' : 0.00,
  'status-running' : 0.40,
  'status-rejected': 0.00,
  'status-other'   : 0.20,
  'status-done'    : 1.00,
};

/*
  SEMÁFORO (Sprint Goal Success Rate — benchmarks ágeis):
  ≥80% Excelente · ≥60% Bom · ≥40% Razoável · ≥20% Ruim · <20% Crítico
*/
function health(pct){
  if(pct>=80) return{c:'#16a34a',l:'Excelente'};
  if(pct>=60) return{c:'#65a30d',l:'Bom'};
  if(pct>=40) return{c:'#d97706',l:'Razoável'};
  if(pct>=20) return{c:'#dc2626',l:'Ruim'};
  return            {c:'#7f1d1d',l:'Crítico'};
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function parseCSV(text){
  const rows=[];
  for(const line of text.split(/\r?\n/)){
    if(!line.trim()) continue;
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ}
      else if(c===','&&!inQ){cells.push(cur.trim());cur=''}
      else cur+=c;
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

function clean(v){return(v||'').replace(/^"|"$/g,'').trim()}

function sc(status){
  const s=(status||'').toLowerCase();
  if(s.includes('execu'))                                             return 'status-running';
  if(s.includes('ag')||s.includes('início')||s.includes('aguard'))   return 'status-waiting';
  if(s.includes('rejeit'))                                            return 'status-rejected';
  if(s.includes('conclu')||s.includes('done')||s.includes('finaliz'))return 'status-done';
  return 'status-other';
}

function wPct(tasks){
  if(!tasks.length) return 0;
  return Math.round(tasks.reduce((a,t)=>a+(W[sc(t.status)]??0.2),0)/tasks.length*100);
}

function ini(name){
  if(!name) return '?';
  const p=name.trim().split(/\s+/);
  return p.length===1?p[0].slice(0,2).toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase();
}

function isCurrent(s){
  const today=new Date(),yr=today.getFullYear();
  const parse=v=>{const[d,m]=v.split('/');return new Date(yr,+m-1,+d)};
  const end=parse(s.end);end.setHours(23,59,59);
  return today>=parse(s.start)&&today<=end;
}

/* ══════════════════════════════════════════
   FETCH COM FALLBACK ENTRE PROXIES
══════════════════════════════════════════ */
async function fetchCSV(){
  const bust=`&_t=${Date.now()}`;
  const errors=[];

  for(let i=0;i<PROXIES.length;i++){
    const label=i===0?'direto':(`proxy ${i}`);
    const targetUrl=i===0?CSV_URL+bust:CSV_URL; // direto usa bust, proxies usam URL limpa
    const fetchUrl=PROXIES[i](targetUrl+(i===0?'':bust));

    // Atualizar status visual
    const board=document.getElementById('board');
    const statusEl=board.querySelector('.load-status');
    if(statusEl) statusEl.textContent=`Tentando ${label}… (${i+1}/${PROXIES.length})`;

    try{
      const res=await fetch(fetchUrl,{
        cache:'no-store',
        signal:AbortSignal.timeout(10000),
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const text=await res.text();
      if(!text||text.trim().length<20) throw new Error('Resposta vazia');
      // Rejeita se veio HTML de erro do Google (não CSV)
      if(text.trim().startsWith('<!DOCTYPE')||text.trim().startsWith('<html'))
        throw new Error('Recebeu HTML em vez de CSV (planilha não publicada ou URL incorreta)');
      console.log(`✅ Conectado via ${label}`);
      return{text,label};
    }catch(e){
      console.warn(`❌ Falhou ${label}:`,e.message);
      errors.push(`${label}: ${e.message}`);
    }
  }
  throw new Error('Não foi possível conectar à planilha após tentar todas as estratégias:\n\n'+errors.join('\n'));
}

/* ══════════════════════════════════════════
   TOOLTIP
══════════════════════════════════════════ */
const gtt=document.getElementById('gtt');
let ttTimer=null;

function showTT(e,html){clearTimeout(ttTimer);gtt.innerHTML=html;gtt.classList.add('on');moveTT(e)}
function moveTT(e){
  let x=e.clientX+14,y=e.clientY-10;
  const tw=310,th=gtt.offsetHeight||140;
  if(x+tw>window.innerWidth-8)  x=e.clientX-tw-10;
  if(y+th>window.innerHeight-8) y=e.clientY-th-4;
  gtt.style.left=x+'px';gtt.style.top=y+'px';
}
function hideTT(){ttTimer=setTimeout(()=>gtt.classList.remove('on'),80)}

function cardTThtml(t){return`
  <div class="tt-row"><span class="tt-lbl">Projeto</span><span class="tt-val">${t.projeto||'—'}</span></div>
  <div class="tt-row"><span class="tt-lbl">Título</span><span class="tt-val">${t.titulo||'—'}</span></div>
  <div class="tt-row"><span class="tt-lbl">Status</span><span class="tt-val">${t.status||'—'}</span></div>
  <div class="tt-row"><span class="tt-lbl">Responsável</span><span class="tt-val">${t.quem||'—'}</span></div>
  <div class="tt-row"><span class="tt-lbl">Sprint</span><span class="tt-val">${t.sprint||'—'}</span></div>
  ${t.entrega?`<div class="tt-row"><span class="tt-lbl">Entrega</span><span class="tt-val">${t.entrega}</span></div>`:''}
  ${t.obs?`<div class="tt-row"><span class="tt-lbl">OBS</span><span class="tt-val">${t.obs}</span></div>`:''}
`}

function progTThtml(tasks,pct,h,scope){
  const counts={};
  tasks.forEach(t=>{const s=sc(t.status);counts[s]=(counts[s]||0)+1});
  const rows=[
    ['Ag. Início','status-waiting'],['Em execução','status-running'],
    ['Concluída','status-done'],['Rejeitada','status-rejected'],['Outros','status-other'],
  ].map(([lbl,key])=>{
    const n=counts[key]||0;if(!n)return'';
    return`<div class="tt-row"><span class="tt-lbl">${lbl}</span><span class="tt-val">${n} × ${(W[key]*100).toFixed(0)}% = ${(n*W[key]).toFixed(2)}</span></div>`;
  }).join('');
  return`
    <div class="tt-hd">Progresso ponderado — ${scope}</div>
    <div class="tt-row"><span class="tt-lbl">Total</span><span class="tt-val">${tasks.length} tarefas</span></div>
    ${rows}
    <div class="tt-sep"></div>
    <div class="tt-row"><span class="tt-lbl">Fórmula</span><span class="tt-val">Σ(peso×qtd) ÷ total × 100</span></div>
    <div class="tt-row"><span class="tt-lbl">Resultado</span><span class="tt-val" style="color:${h.c};font-weight:700">${pct}% — ${h.l}</span></div>
    <div class="tt-sep"></div>
    <div class="tt-hd">Pesos dos status</div>
    <div class="tt-row"><span class="tt-lbl">Ag. Início</span><span class="tt-val">0%</span></div>
    <div class="tt-row"><span class="tt-lbl">Em execução</span><span class="tt-val">40%</span></div>
    <div class="tt-row"><span class="tt-lbl">Concluída</span><span class="tt-val">100%</span></div>
    <div class="tt-row"><span class="tt-lbl">Rejeitada</span><span class="tt-val">0%</span></div>
    <div class="tt-row"><span class="tt-lbl">Outros</span><span class="tt-val">20%</span></div>
    <div class="tt-sep"></div>
    <div class="tt-hd">Semáforo de saúde</div>
    <div class="tt-row"><span class="tt-lbl" style="color:#16a34a">≥ 80%</span><span class="tt-val">Excelente</span></div>
    <div class="tt-row"><span class="tt-lbl" style="color:#65a30d">≥ 60%</span><span class="tt-val">Bom</span></div>
    <div class="tt-row"><span class="tt-lbl" style="color:#d97706">≥ 40%</span><span class="tt-val">Razoável</span></div>
    <div class="tt-row"><span class="tt-lbl" style="color:#dc2626">≥ 20%</span><span class="tt-val">Ruim</span></div>
    <div class="tt-row"><span class="tt-lbl" style="color:#7f1d1d">< 20%</span><span class="tt-val">Crítico</span></div>`;
}

/* ══════════════════════════════════════════
   FILTRO
══════════════════════════════════════════ */
let activeFilters=new Set(['ALL']);

function buildFilters(names){
  const wrap=document.getElementById('sprintFilters');
  wrap.innerHTML='';
  const mk=(val,lbl)=>{
    const b=document.createElement('button');
    b.className='sprint-btn'+(activeFilters.has(val)?' active':'');
    b.dataset.sprint=val;b.textContent=lbl;
    b.addEventListener('click',()=>toggleFilter(val));
    wrap.appendChild(b);
  };
  mk('ALL','Todas');names.forEach(n=>mk(n,n));
}

function toggleFilter(sprint){
  if(sprint==='ALL'){activeFilters=new Set(['ALL'])}
  else{
    activeFilters.delete('ALL');
    activeFilters.has(sprint)?activeFilters.delete(sprint):activeFilters.add(sprint);
    if(!activeFilters.size) activeFilters.add('ALL');
  }
  document.querySelectorAll('.sprint-btn').forEach(b=>b.classList.toggle('active',activeFilters.has(b.dataset.sprint)));
  document.querySelectorAll('.sprint-block').forEach(b=>b.classList.toggle('hidden',!activeFilters.has('ALL')&&!activeFilters.has(b.dataset.sprint)));
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function buildBoard(sprintData){
  const board=document.getElementById('board');
  board.innerHTML='';

  const allDevs=new Set();
  sprintData.forEach(({tasks})=>tasks.forEach(t=>{if(t.quem)allDevs.add(t.quem)}));
  const devColor={};
  [...allDevs].forEach((d,i)=>{devColor[d]=i%10});

  buildFilters(sprintData.filter(s=>s.tasks.length).map(s=>s.sprint.name));

  sprintData.forEach(({sprint,tasks})=>{
    if(!tasks.length) return;

    // Agrupar por dev
    const devMap={};
    tasks.forEach(t=>{
      const dev=t.quem||'Não atribuído';
      if(!devMap[dev]) devMap[dev]=[];
      devMap[dev].push(t);
    });
    const devs=Object.keys(devMap).sort();

    // Métricas sprint
    const total=tasks.length;
    const cBy={};
    tasks.forEach(t=>{const s=sc(t.status);cBy[s]=(cBy[s]||0)+1});
    const running =cBy['status-running'] ||0;
    const waiting =cBy['status-waiting'] ||0;
    const rejected=cBy['status-rejected']||0;
    const done    =cBy['status-done']    ||0;
    const other   =cBy['status-other']   ||0;
    const sPct=wPct(tasks);
    const sH=health(sPct);

    // Projetos
    const projMap={};
    tasks.forEach(t=>{const p=t.projeto||'(s/ projeto)';projMap[p]=(projMap[p]||0)+1});
    const projList=Object.entries(projMap).sort((a,b)=>b[1]-a[1]);

    /* ── Sprint block ── */
    const block=document.createElement('div');
    block.className='sprint-block'+(isCurrent(sprint)?' is-current':'');
    block.dataset.sprint=sprint.name;

    /* ══ INFO BAR ══ */
    const infoBar=document.createElement('div');
    infoBar.className='sprint-info-bar';

    // 1. Identidade
    const idDiv=document.createElement('div');
    idDiv.className='si-identity';
    idDiv.innerHTML=`
      <div>
        <div class="sprint-name">${sprint.name}${isCurrent(sprint)?'&nbsp;<span class="current-badge">Atual</span>':''}</div>
        <div class="sprint-dates">${sprint.start} → ${sprint.end} · ${total} tarefa${total!==1?'s':''}</div>
      </div>`;
    infoBar.appendChild(idDiv);

    // 2. KPI pills
    const kpisDiv=document.createElement('div');
    kpisDiv.className='si-kpis';
    [
      [running,  'var(--status-running-b)',  'Exec.'],
      [waiting,  'var(--status-waiting-b)',  'Ag.'],
      [done,     'var(--status-done-b)',     'Ok'],
      [rejected, 'var(--status-rejected-b)', 'Rej.'],
      [other,    'var(--status-other-b)',    'Outro'],
    ].forEach(([n,color,lbl])=>{
      if(!n) return;
      const pill=document.createElement('div');
      pill.className='kpi-pill';
      pill.innerHTML=`<div class="kpi-dot" style="background:${color}"></div><span class="kpi-text"><strong>${n}</strong> ${lbl} <span style="color:var(--text-muted)">(${Math.round(n/total*100)}%)</span></span>`;
      kpisDiv.appendChild(pill);
    });
    infoBar.appendChild(kpisDiv);

    // 3. Progresso total
    const progDiv=document.createElement('div');
    progDiv.className='si-progress';
    progDiv.innerHTML=`
      <span class="prog-title">Progresso total da sprint</span>
      <div class="prog-bar-h"><div class="prog-bar-fill" style="width:${sPct}%;background:${sH.c}"></div></div>
      <span class="prog-pct" style="color:${sH.c}">${sPct}%</span>
      <span class="prog-health" style="color:${sH.c}">${sH.l}</span>
      <span class="info-icon">ⓘ</span>`;
    const iIcon=progDiv.querySelector('.info-icon');
    iIcon.addEventListener('mouseenter',e=>showTT(e,progTThtml(tasks,sPct,sH,sprint.name)));
    iIcon.addEventListener('mousemove',moveTT);
    iIcon.addEventListener('mouseleave',hideTT);
    infoBar.appendChild(progDiv);

    block.appendChild(infoBar);

    /* ══ SCROLL: coluna projetos + colunas devs ══ */
    const scrollWrap=document.createElement('div');
    scrollWrap.className='sprint-scroll';
    const colsWrap=document.createElement('div');
    colsWrap.className='sprint-cols';

    /* ── Coluna de Projetos (primeira) ── */
    const projCol=document.createElement('div');
    projCol.className='dev-col proj-col';

    const projHead=document.createElement('div');
    projHead.className='dev-head';
    projHead.innerHTML=`
      <div class="dev-top-row">
        <div class="dev-avatar" style="background:#6366f1;font-size:11px">📁</div>
        <div style="min-width:0">
          <div class="dev-name">Projetos</div>
          <div class="dev-count">${projList.length} projeto${projList.length!==1?'s':''} · ${total} demanda${total!==1?'s':''}</div>
        </div>
      </div>
      <div class="dev-chips"></div>
      <div class="dev-prog-row" style="visibility:hidden;height:9px"></div>`;
    projCol.appendChild(projHead);

    const projCardsWrap=document.createElement('div');
    projCardsWrap.className='dev-cards';

    projList.forEach(([projName,count])=>{
      const projTasks=tasks.filter(t=>t.projeto===projName);
      const projLinks=projTasks.map(t=>t.link).filter(Boolean);

      const pCard=document.createElement('div');
      pCard.className='task-card proj-card status-other';
      pCard.style.cursor=projLinks.length?'pointer':'default';
      pCard.innerHTML=`
        <div class="proj-card-name">${projName}</div>
        <div class="proj-card-meta">
          <span class="proj-card-count">${count} demanda${count!==1?'s':''}</span>
          ${projLinks.length?'<span class="proj-card-hint">↗</span>':''}
        </div>`;

      if(projLinks.length===1){
        pCard.addEventListener('click',()=>window.open(projLinks[0],'_blank'));
      }else if(projLinks.length>1){
        pCard.addEventListener('click',()=>{
          projLinks.forEach((u,i)=>setTimeout(()=>window.open(u,'_blank'),i*130));
        });
      }

      pCard.addEventListener('mouseenter',e=>{
        const st=projTasks.reduce((a,t)=>{const s=sc(t.status);a[s]=(a[s]||0)+1;return a},{});
        const lines=[
          ['status-running','Em execução'],['status-waiting','Ag. Início'],
          ['status-done','Concluída'],['status-rejected','Rejeitada'],['status-other','Outros'],
        ].filter(([k])=>st[k]).map(([k,l])=>
          `<div class="tt-row"><span class="tt-lbl">${l}</span><span class="tt-val">${st[k]}</span></div>`
        ).join('');
        showTT(e,`
          <div class="tt-hd">Projeto</div>
          <div class="tt-row"><span class="tt-lbl">Nome</span><span class="tt-val">${projName}</span></div>
          <div class="tt-row"><span class="tt-lbl">Demandas</span><span class="tt-val">${count}</span></div>
          <div class="tt-sep"></div><div class="tt-hd">Por status</div>${lines}
          ${projLinks.length?`<div class="tt-sep"></div><div style="font-size:10px;color:#9ca3af">Clique → abrir ${projLinks.length} demanda${projLinks.length!==1?'s':''}</div>`:''}`);
      });
      pCard.addEventListener('mousemove',moveTT);
      pCard.addEventListener('mouseleave',hideTT);
      projCardsWrap.appendChild(pCard);
    });

    projCol.appendChild(projCardsWrap);
    colsWrap.appendChild(projCol);

    /* ── Colunas de Dev ── */
    devs.forEach(dev=>{
      const dt=devMap[dev];
      const dTot=dt.length;
      const dBy={};
      dt.forEach(t=>{const s=sc(t.status);dBy[s]=(dBy[s]||0)+1});
      const dPct=wPct(dt);
      const dH=health(dPct);

      let chips='';
      if(dBy['status-running']) chips+=`<span class="chip chip-running">${dBy['status-running']} exec.</span>`;
      if(dBy['status-waiting']) chips+=`<span class="chip chip-waiting">${dBy['status-waiting']} ag.</span>`;
      if(dBy['status-done'])    chips+=`<span class="chip chip-done">${dBy['status-done']} ok</span>`;
      if(dBy['status-rejected'])chips+=`<span class="chip chip-rejected">${dBy['status-rejected']} rej.</span>`;
      if(dBy['status-other'])   chips+=`<span class="chip chip-other">${dBy['status-other']} outro${dBy['status-other']!==1?'s':''}</span>`;

      const devCol=document.createElement('div');
      devCol.className='dev-col';

      const devHead=document.createElement('div');
      devHead.className='dev-head';
      devHead.innerHTML=`
        <div class="dev-top-row">
          <div class="dev-avatar av-${devColor[dev]??0}">${ini(dev)}</div>
          <div style="min-width:0">
            <div class="dev-name">${dev}</div>
            <div class="dev-count">${dTot} card${dTot!==1?'s':''}</div>
          </div>
        </div>
        <div class="dev-chips">${chips}</div>
        <div class="dev-prog-row">
          <div class="dev-prog-track"><div class="dev-prog-fill" style="width:${dPct}%;background:${dH.c}"></div></div>
          <span class="dev-prog-pct" style="color:${dH.c}">${dPct}%</span>
          <span class="info-icon">ⓘ</span>
        </div>`;

      const dIcon=devHead.querySelector('.info-icon');
      dIcon.addEventListener('mouseenter',e=>showTT(e,progTThtml(dt,dPct,dH,dev)));
      dIcon.addEventListener('mousemove',moveTT);
      dIcon.addEventListener('mouseleave',hideTT);
      devCol.appendChild(devHead);

      const cardsWrap=document.createElement('div');
      cardsWrap.className='dev-cards';
      if(!dt.length){
        cardsWrap.innerHTML='<div class="empty-col">—</div>';
      }else{
        dt.forEach(task=>{
          const card=document.createElement('div');
          card.className=`task-card ${sc(task.status)}`;
          card.innerHTML=`
            <div class="card-project">${task.projeto||'—'}</div>
            <div class="card-title">${task.titulo||'(sem título)'}</div>`;
          if(task.link) card.addEventListener('click',()=>window.open(task.link,'_blank'));
          card.addEventListener('mouseenter',e=>showTT(e,cardTThtml(task)));
          card.addEventListener('mousemove',moveTT);
          card.addEventListener('mouseleave',hideTT);
          cardsWrap.appendChild(card);
        });
      }
      devCol.appendChild(cardsWrap);
      colsWrap.appendChild(devCol);
    });

    scrollWrap.appendChild(colsWrap);
    block.appendChild(scrollWrap);
    board.appendChild(block);
  });

  if(!board.children.length){
    board.innerHTML='<div class="state-overlay">Nenhuma tarefa encontrada nas sprints configuradas.</div>';
  }
}

/* ══════════════════════════════════════════
   LOAD
══════════════════════════════════════════ */
async function loadData(){
  const board=document.getElementById('board');
  const btn=document.getElementById('reloadBtn');
  board.innerHTML='<div class="state-overlay"><div class="spinner"></div><span>Buscando dados da planilha…</span><span class="load-status" style="font-size:10.5px;color:var(--text-muted);margin-top:4px"></span></div>';
  document.getElementById('sprintFilters').innerHTML='';
  activeFilters=new Set(['ALL']);
  if(btn){btn.disabled=true;btn.textContent='⏳ Carregando…'}

  try{
    const {text}=await fetchCSV();
    const rows=parseCSV(text);
    if(rows.length<2) throw new Error('Planilha retornou vazia. Verifique se está publicada corretamente.');

    const headers=rows[0].map(h=>h.trim());
    const idx=(...names)=>{
      for(const n of names){
        const i=headers.findIndex(h=>h.toLowerCase().includes(n.toLowerCase()));
        if(i>=0) return i;
      }
      return -1;
    };

    const iC=idx('cliente'),iP=idx('projeto'),iL=idx('task','link'),
          iT=idx('título','titulo','title'),iS=idx('status'),
          iQ=idx('quem','responsável','responsavel'),iSp=idx('sprint'),
          iE=idx('entrega','data'),iO=idx('obs','observ');

    const get=(cells,i)=>i>=0?clean(cells[i]):'';

    const allTasks=rows.slice(1)
      .map(cells=>({
        cliente:get(cells,iC),projeto:get(cells,iP),link:get(cells,iL),
        titulo:get(cells,iT),status:get(cells,iS),quem:get(cells,iQ),
        sprint:get(cells,iSp),entrega:get(cells,iE),obs:get(cells,iO),
      }))
      .filter(t=>t.sprint.length>0);

    if(!allTasks.length){
      throw new Error('Nenhuma linha com coluna Sprint preenchida encontrada.\n\nCabeçalhos detectados: '+headers.slice(0,8).join(', '));
    }

    const sprintMap={};
    allTasks.forEach(t=>{if(!sprintMap[t.sprint])sprintMap[t.sprint]=[];sprintMap[t.sprint].push(t)});

    const sprintData=SPRINT_CONFIG.map(cfg=>({sprint:cfg,tasks:sprintMap[cfg.name]||[]}));

    if(!sprintData.some(s=>s.tasks.length)){
      const found=Object.keys(sprintMap).slice(0,5).join(', ')||'nenhum';
      throw new Error(`Nenhuma tarefa encontrada para Sprint 14/15/16.\nValores encontrados na coluna Sprint: ${found}`);
    }

    buildBoard(sprintData);

    const now=new Date();
    document.getElementById('lastUpdated').textContent=
      'Atualizado: '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  }catch(err){
    console.error(err);
    board.innerHTML=`
      <div class="state-overlay">
        <div class="error-box">
          <h3>⚠️ Não foi possível carregar os dados</h3>
          <p>${err.message.replace(/\n/g,'<br>')}</p>
          <div class="tt-sep" style="border-color:#e2e5eb;margin:12px 0"></div>
          <p style="font-weight:600;font-size:12.5px;color:#1a1d23;margin-bottom:8px">Verifique se a planilha está publicada:</p>
          <div class="error-step"><div class="error-step-n">1</div><span>Abra a planilha no Google Sheets</span></div>
          <div class="error-step"><div class="error-step-n">2</div><span>Clique em <strong>Arquivo → Compartilhar → Publicar na Web</strong></span></div>
          <div class="error-step"><div class="error-step-n">3</div><span>Selecione <strong>Documento inteiro</strong> e formato <strong>Valores separados por vírgula (.csv)</strong></span></div>
          <div class="error-step"><div class="error-step-n">4</div><span>Clique em <strong>Publicar</strong> e confirme</span></div>
          <div class="error-step"><div class="error-step-n">5</div><span>Aguarde ~2 min e clique em Tentar novamente</span></div>
          <p style="margin-top:10px;font-size:11.5px;color:#9099a8">URL esperada:<br><code>${CSV_URL}</code></p>
          <button class="retry-btn" onclick="loadData()">↺ Tentar novamente</button>
        </div>
      </div>`;
  }finally{
    if(btn){btn.disabled=false;btn.textContent='↺ Atualizar'}
  }
}

loadData();
</script>
