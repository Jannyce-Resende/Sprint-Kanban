<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sprint Dashboard — Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#eef0f4;
  --surface:#fff;
  --surface2:#f6f7f9;
  --border:#e2e5eb;
  --border-strong:#cdd2db;
  --text-primary:#1a1d23;
  --text-secondary:#5c6370;
  --text-muted:#9099a8;
  --accent:#6366f1;
  --sprint-today-bg:#f0fdf4;
  --sprint-today-border:#86efac;
  --col-dev:190px;
  --card-r:5px;
  --sh-card:0 1px 3px rgba(0,0,0,.07);
  --sh-hover:0 3px 12px rgba(0,0,0,.13);
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh}

/* ══ HEADER ══ */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;position:sticky;top:0;z-index:300}
.hdr-center{flex:1;display:flex;align-items:center;justify-content:center;gap:9px}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;flex-shrink:0}
header h1{font-size:17px;font-weight:600;letter-spacing:-.3px;white-space:nowrap}
header h1 span{color:var(--text-muted);font-weight:400}
.hdr-right{position:absolute;right:20px;display:flex;align-items:center;gap:7px}
.last-updated{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace}
.reload-btn{display:flex;align-items:center;gap:3px;padding:3px 10px;border-radius:5px;border:1px solid var(--border-strong);background:var(--surface);color:var(--text-secondary);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s}
.reload-btn:hover{background:var(--surface2);color:var(--text-primary)}
.reload-btn:disabled{opacity:.5;cursor:default}

/* ══ TOOLBAR ══ */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar-label{font-size:10.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.sprint-filters{display:flex;gap:5px;flex-wrap:wrap}
.sprint-btn{padding:2px 11px;border-radius:20px;border:1px solid var(--border-strong);background:var(--surface);color:var(--text-secondary);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s;white-space:nowrap}
.sprint-btn:hover{background:var(--surface2)}
.sprint-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* ══ BOARD ══ */
.board-wrap{padding:12px 20px 32px;display:flex;flex-direction:column;gap:12px}

/* ── Sprint block ── */
.sprint-block{border-radius:9px;border:1px solid var(--border);background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.04);overflow:hidden}
.sprint-block.is-current{border-color:var(--sprint-today-border);box-shadow:0 0 0 2px rgba(134,239,172,.2),0 1px 4px rgba(0,0,0,.04)}
.sprint-block.hidden{display:none}

/* ══ SPRINT INFO BAR ══ */
.sprint-info-bar{display:flex;align-items:stretch;border-bottom:1px solid var(--border);background:var(--surface2);flex-wrap:nowrap;overflow:hidden}
.sprint-block.is-current .sprint-info-bar{background:var(--sprint-today-bg)}

.si-identity{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 12px;border-right:1px solid var(--border);flex-shrink:0;min-width:175px}
.sprint-name{font-size:13px;font-weight:700;color:var(--text-primary);white-space:nowrap}
.current-badge{font-size:8.5px;background:#22c55e;color:#fff;padding:1px 6px;border-radius:10px;font-weight:600;white-space:nowrap}
.sprint-dates{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap}

/* KPI pills — clicáveis */
.si-kpis{display:flex;align-items:center;padding:0 4px;border-right:1px solid var(--border);flex-shrink:0}
.kpi-pill{
  display:flex;align-items:center;gap:3px;
  padding:0 7px;height:100%;min-height:36px;
  border-right:1px solid var(--border);white-space:nowrap;
  cursor:pointer;transition:background .12s;
  user-select:none;
}
.kpi-pill:last-child{border-right:none}
.kpi-pill:hover{background:rgba(99,102,241,.07)}
.kpi-pill.active-filter{background:rgba(99,102,241,.12);outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px}
.kpi-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.kpi-text{font-size:10.5px;color:var(--text-secondary)}
.kpi-text strong{color:var(--text-primary);font-weight:600}

/* Progresso total — destacado */
.si-progress{display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;border-right:1px solid var(--border)}
.prog-title{font-size:10px;color:var(--text-muted);white-space:nowrap;font-weight:500}
.prog-bar-h{width:100px;height:7px;background:var(--border);border-radius:5px;overflow:hidden;flex-shrink:0}
.prog-bar-fill{height:100%;border-radius:5px;transition:width .4s}
.prog-pct{font-size:14px;font-family:'DM Mono',monospace;font-weight:700;white-space:nowrap}
.prog-health{font-size:11px;font-weight:700;white-space:nowrap}
.info-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--border);color:var(--text-muted);font-size:8.5px;cursor:help;flex-shrink:0;font-weight:700}
.info-icon:hover{background:var(--accent);color:#fff}

/* ══ SCROLL AREA ══ */
.sprint-scroll{overflow-x:auto;scroll-behavior:smooth}
.sprint-scroll::-webkit-scrollbar{height:4px}
.sprint-scroll::-webkit-scrollbar-track{background:var(--surface2)}
.sprint-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.sprint-scroll::-webkit-scrollbar-thumb:hover{background:#aab2be}
.sprint-cols{display:flex;min-width:max-content}

/* ── Dev / Proj column ── */
.dev-col{width:var(--col-dev);min-width:var(--col-dev);flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column}
.proj-col{width:190px;min-width:190px}

.dev-head{padding:6px 8px 5px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;flex-direction:column;gap:4px}
.dev-top-row{display:flex;align-items:center;gap:6px}
.dev-avatar{width:22px;height:22px;border-radius:50%;color:#fff;font-size:9.5px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dev-name{font-size:11px;font-weight:600;color:var(--text-primary);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.dev-count{font-size:9.5px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap}
.dev-chips{display:flex;gap:2px;flex-wrap:wrap}
.chip{font-size:8.5px;padding:1px 5px;border-radius:8px;font-weight:500;border:1px solid transparent;white-space:nowrap}
.dev-prog-row{display:flex;align-items:center;gap:5px}
.dev-prog-track{flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.dev-prog-fill{height:100%;border-radius:3px;transition:width .4s}
.dev-prog-pct{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;white-space:nowrap}

/* cards area */
.dev-cards{padding:5px 5px 6px;display:flex;flex-direction:column;gap:3px;flex:1}

/* task card */
.task-card{border-radius:var(--card-r);padding:5px 8px;box-shadow:var(--sh-card);cursor:pointer;transition:box-shadow .12s,transform .12s,opacity .15s;border:1px solid transparent;display:flex;flex-direction:column;gap:1px}
.task-card:hover{box-shadow:var(--sh-hover);transform:translateY(-1px);z-index:2}
.task-card.dimmed{opacity:.25;pointer-events:none}
.card-project{font-size:8.5px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;line-height:1}
.card-title{font-size:10.5px;font-weight:500;color:var(--text-primary);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(var(--col-dev) - 20px)}

/* proj card */
.proj-card{background:var(--surface2)!important;border-color:var(--border)!important}
.proj-card:hover{background:#eef2ff!important;border-color:#a5b4fc!important}
.proj-card-name{font-size:10.5px;font-weight:600;color:var(--text-primary);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.proj-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.proj-card-count{font-size:9.5px;color:var(--text-muted);font-family:'DM Mono',monospace}
.proj-card-hint{font-size:9.5px;color:var(--accent);font-weight:600}

.empty-col{color:var(--text-muted);font-size:10px;text-align:center;padding:14px 6px;opacity:.4}

/* ══ MODAL — centralizado, fundo cinza kanban ══ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(15,17,22,.55);
  backdrop-filter:blur(2px);
  z-index:500;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 20px;
  animation:fadeIn .16s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.modal-box{
  background:#eef0f4;          /* mesmo fundo do kanban */
  border-radius:12px;
  width:100%;
  max-width:1120px;
  max-height:88vh;
  display:flex;
  flex-direction:column;
  animation:popIn .18s ease;
  box-shadow:0 24px 64px rgba(0,0,0,.28), 0 2px 8px rgba(0,0,0,.12);
  border:1px solid var(--border);
  overflow:hidden;
}
@keyframes popIn{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}

.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--surface);
  border-radius:12px 12px 0 0;
}
.modal-title{font-size:15px;font-weight:700;color:var(--text-primary)}
.modal-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.modal-close{
  width:28px;height:28px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--text-secondary);
  font-size:15px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;flex-shrink:0;
}
.modal-close:hover{background:#e2e5eb;color:var(--text-primary)}

/* área scrollável do modal */
.modal-scroll{
  overflow-x:auto;overflow-y:auto;flex:1;
  padding:16px 18px 20px;
}
.modal-scroll::-webkit-scrollbar{height:4px;width:4px}
.modal-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}

.modal-cols{display:flex;gap:10px;min-width:max-content;align-items:flex-start}

/* coluna de dev dentro do modal — mesmo visual do board */
.modal-dev-col{
  width:200px;min-width:200px;
  background:var(--surface);
  border-radius:8px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.modal-dev-head{
  padding:8px 10px 7px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
  display:flex;align-items:center;gap:7px;
}
.modal-dev-cards{
  padding:6px;display:flex;flex-direction:column;gap:4px;
  background:#eef0f4;   /* fundo kanban dentro das colunas */
}
.modal-empty{color:var(--text-muted);font-size:10px;text-align:center;padding:12px;opacity:.5}

/* ══ TOOLTIP ══ */
.gtt{position:fixed;background:#1c1f26;color:#e5e7eb;padding:9px 12px;border-radius:8px;font-size:11px;line-height:1.5;max-width:310px;pointer-events:none;z-index:9999;opacity:0;transition:opacity .1s;box-shadow:0 8px 28px rgba(0,0,0,.32)}
.gtt.on{opacity:1}
.tt-row{display:flex;gap:6px;margin-bottom:2px}
.tt-lbl{color:#6b7280;min-width:72px;font-size:10.5px;flex-shrink:0}
.tt-val{color:#e5e7eb;font-weight:500}
.tt-sep{border-top:1px solid rgba(255,255,255,.08);margin:5px 0}
.tt-hd{font-size:9.5px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}

/* ══ STATES ══ */
.state-overlay{display:flex;align-items:center;justify-content:center;min-height:200px;flex-direction:column;gap:10px;color:var(--text-muted);font-size:13px;padding:20px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;max-width:520px;width:100%}
.error-box h3{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:10px}
.error-box p{font-size:12.5px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
.error-box code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;font-family:'DM Mono',monospace;word-break:break-all}
.error-step{display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text-secondary)}
.error-step-n{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.retry-btn{margin-top:14px;padding:7px 18px;border-radius:7px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.retry-btn:hover{opacity:.85}

/* Avatar palette */
.av-0{background:#6366f1}.av-1{background:#0ea5e9}.av-2{background:#10b981}
.av-3{background:#f59e0b}.av-4{background:#ef4444}.av-5{background:#8b5cf6}
.av-6{background:#14b8a6}.av-7{background:#f97316}.av-8{background:#ec4899}
.av-9{background:#6d28d9}
</style>
</head>
<body>

<header>
  <div class="hdr-center">
    <div class="logo-mark">KB</div>
    <h1>Sprint Board <span>— Kanban View</span></h1>
  </div>
  <div class="hdr-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="reload-btn" id="reloadBtn" onclick="loadData()">↺ Atualizar</button>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Sprint</span>
  <div class="sprint-filters" id="sprintFilters"></div>
</div>

<div class="board-wrap" id="board">
  <div class="state-overlay"><div class="spinner"></div><span>Carregando dados…</span></div>
</div>

<div class="gtt" id="gtt"></div>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYN5AW9FVnV62E5Ur4w-S-XXm5O3uP8jS-myDMaruKi2jq_xbQxl85D3k0zZzOfl5PsNVpapJga68U/pub?output=csv';

const PROXIES = [
  url => url,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

const SPRINT_CONFIG = [
  { name:'Sprint 14', start:'30/03', end:'03/04' },
  { name:'Sprint 15', start:'06/04', end:'10/04' },
  { name:'Sprint 16', start:'13/04', end:'17/04' },
];

/* ─────────────────────────────────────────────
   STATUS ENGINE — dinâmico + extensível

   Classificação por palavras-chave (lowercase).
   Ao encontrar um status novo na planilha que
   não bata em nenhuma regra, ele cai em
   "status-other" e recebe peso 0.20.

   PESOS (Agile Weighted Progress):
     Ag. Início      →  0%   (não iniciado)
     Em execução     → 40%   (ativo)
     Ag. Liberação   → 75%   (concluído, aguarda deploy/aprovação)
     Em validação    → 100%  (equivale a concluído para efeito de progresso)
     Concluída/Done  → 100%  (entregue)
     Rejeitada       →  0%   (sem valor)
     Outros          → 20%   (indefinido)

   "Ag. Liberação" recebe 75% pois o trabalho
   técnico está feito mas ainda depende de
   liberação externa — referência: Definition of
   Done parcial (SAFe / Scrum Guide).
───────────────────────────────────────────── */
const STATUS_RULES = [
  // [regex-like keywords, cssClass, weight, displayLabel, bgColor, borderColor, chipClass]
  { keys:['ag. início','ag.início','aguardando início','ag inicio'],  cls:'status-waiting',   w:0.00, lbl:'Ag. Início',     bg:'#fef9c3', bd:'#fde047', cc:'chip-waiting'  },
  { keys:['em execução','execução','em execucao','execucao'],         cls:'status-running',   w:0.40, lbl:'Em execução',    bg:'#dbeafe', bd:'#93c5fd', cc:'chip-running'  },
  { keys:['ag. liberação','ag. liberacao','aguardando liberação','liberação','liberacao'], cls:'status-release', w:0.75, lbl:'Ag. Liberação', bg:'#ede9fe', bd:'#c4b5fd', cc:'chip-release'},
  { keys:['em validação','em validacao','validação','validacao'],     cls:'status-validation',w:1.00, lbl:'Em validação',   bg:'#d1fae5', bd:'#6ee7b7', cc:'chip-validation'},
  { keys:['concluída','concluido','concluída','done','finaliz','entregue'], cls:'status-done', w:1.00, lbl:'Concluída', bg:'#dcfce7', bd:'#86efac', cc:'chip-done'},
  { keys:['rejeitada','rejeitado','cancelad'],                        cls:'status-rejected',  w:0.00, lbl:'Rejeitada',     bg:'#fee2e2', bd:'#fca5a5', cc:'chip-rejected' },
];
const STATUS_OTHER = { cls:'status-other', w:0.20, lbl:'Outros', bg:'#f1f3f5', bd:'#d1d5db', cc:'chip-other' };

// Injeta CSS dinâmico para cada status
(function injectStatusCSS(){
  const sheet=document.createElement('style');
  STATUS_RULES.forEach(r=>{
    sheet.textContent+=`
      .task-card.${r.cls}{background:${r.bg};border-color:${r.bd}}
      .${r.cc}{background:${r.bg};border-color:${r.bd};color:${adjustColor(r.bd)}}
    `;
  });
  sheet.textContent+=`
    .task-card.${STATUS_OTHER.cls}{background:${STATUS_OTHER.bg};border-color:${STATUS_OTHER.bd}}
    .${STATUS_OTHER.cc}{background:${STATUS_OTHER.bg};border-color:${STATUS_OTHER.bd};color:#374151}
    .chip-release{color:#5b21b6}
    .chip-validation{color:#065f46}
  `;
  document.head.appendChild(sheet);
})();

function adjustColor(hex){
  // Escurece a cor de borda para usar como texto do chip
  return hex; // simplificado; chips têm override manual acima
}

// Descobre o status de uma tarefa
function getStatus(rawStatus){
  const s=(rawStatus||'').toLowerCase().trim();
  if(!s) return STATUS_OTHER;
  for(const r of STATUS_RULES){
    if(r.keys.some(k=>s.includes(k))) return r;
  }
  return STATUS_OTHER;
}

// Cache de status desconhecidos encontrados na planilha (para exibição dinâmica)
const unknownStatuses = new Map(); // rawLabel → {cls, w, lbl, bg, bd, cc}

function resolveStatus(rawStatus){
  const base = getStatus(rawStatus);
  if(base !== STATUS_OTHER) return base;
  // Status desconhecido — cria entrada dinâmica
  const key = (rawStatus||'').trim();
  if(key && !unknownStatuses.has(key)){
    unknownStatuses.set(key,{...STATUS_OTHER, lbl:key});
  }
  return unknownStatuses.get(key)||STATUS_OTHER;
}

/* ─────────────────────────────────────────────
   PROGRESSO PONDERADO
   Fórmula: Σ(peso_i) / N × 100
   Novos status desconhecidos recebem peso 0.20
───────────────────────────────────────────── */
function wPct(tasks){
  if(!tasks.length) return 0;
  const sum=tasks.reduce((a,t)=>a+resolveStatus(t.status).w,0);
  return Math.round(sum/tasks.length*100);
}

/*
  SEMÁFORO (Sprint Goal Success Rate — benchmarks ágeis):
  ≥80% Excelente · ≥60% Bom · ≥40% Razoável · ≥20% Ruim · <20% Crítico
*/
function health(pct){
  if(pct>=80) return{c:'#16a34a',l:'Excelente'};
  if(pct>=60) return{c:'#65a30d',l:'Bom'};
  if(pct>=40) return{c:'#d97706',l:'Razoável'};
  if(pct>=20) return{c:'#dc2626',l:'Ruim'};
  return            {c:'#7f1d1d',l:'Crítico'};
}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function parseCSV(text){
  const rows=[];
  for(const line of text.split(/\r?\n/)){
    if(!line.trim()) continue;
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ}
      else if(c===','&&!inQ){cells.push(cur.trim());cur=''}
      else cur+=c;
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

function clean(v){return(v||'').replace(/^"|"$/g,'').trim()}

function ini(name){
  if(!name) return '?';
  const p=name.trim().split(/\s+/);
  return p.length===1?p[0].slice(0,2).toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase();
}

function isCurrent(s){
  const today=new Date(),yr=today.getFullYear();
  const parse=v=>{const[d,m]=v.split('/');return new Date(yr,+m-1,+d)};
  const end=parse(s.end);end.setHours(23,59,59);
  return today>=parse(s.start)&&today<=end;
}

/* ═══════════════════════════════════════════════
   FETCH COM FALLBACK
═══════════════════════════════════════════════ */
async function fetchCSV(){
  const bust=`&_t=${Date.now()}`;
  const errors=[];
  for(let i=0;i<PROXIES.length;i++){
    const label=i===0?'direto':`proxy ${i}`;
    const fetchUrl=PROXIES[i](CSV_URL+bust);
    const statusEl=document.querySelector('.load-status');
    if(statusEl) statusEl.textContent=`Tentando ${label}… (${i+1}/${PROXIES.length})`;
    try{
      const res=await fetch(fetchUrl,{cache:'no-store',signal:AbortSignal.timeout(10000)});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const text=await res.text();
      if(!text||text.trim().length<20) throw new Error('Resposta vazia');
      if(text.trim().startsWith('<!DOCTYPE')||text.trim().startsWith('<html'))
        throw new Error('Recebeu HTML em vez de CSV');
      console.log(`✅ ${label}`);
      return{text,label};
    }catch(e){
      console.warn(`❌ ${label}:`,e.message);
      errors.push(`${label}: ${e.message}`);
    }
  }
  throw new Error('Não foi possível conectar:\n'+errors.join('\n'));
}

let devColorGlobal={};

function openModal(title, subtitle, tasks){
  // Remove modal anterior se existir
  document.querySelector('.modal-overlay')?.remove();

  // Agrupar por dev
  const devMap={};
  tasks.forEach(t=>{
    const dev=t.quem||'Não atribuído';
    if(!devMap[dev]) devMap[dev]=[];
    devMap[dev].push(t);
  });
  const devs=Object.keys(devMap).sort();

  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay) overlay.remove()});

  const box=document.createElement('div');
  box.className='modal-box';

  // Header
  const hdr=document.createElement('div');
  hdr.className='modal-header';
  hdr.innerHTML=`
    <div>

  } else {
    devs.forEach(dev=>{
      const dt=devMap[dev];
      const ci=devColorGlobal[dev]??0;

      const col=document.createElement('div');
      col.className='modal-dev-col';

      const head=document.createElement('div');
      head.className='modal-dev-head';
      head.innerHTML=`
        <div class="dev-avatar av-${ci}" style="width:20px;height:20px;font-size:9px">${ini(dev)}</div>
        <div>
          <div class="dev-name">${dev}</div>
          <div class="dev-count">${dt.length} card${dt.length!==1?'s':''}</div>
        </div>`;
      col.appendChild(head);

      const cards=document.createElement('div');
      cards.className='modal-dev-cards';

      if(!dt.length){
        cards.innerHTML='<div class="modal-empty">—</div>';
      } else {
        dt.forEach(task=>{

          if(task.link) card.addEventListener('click',()=>window.open(task.link,'_blank'));

          card.addEventListener('mouseleave',hideTT);
          cards.appendChild(card);
        });
      }
      col.appendChild(cards);
      cols.appendChild(col);
    });
  }

  scroll.appendChild(cols);
  box.appendChild(scroll);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

let activeFilters=new Set(['ALL']);

function buildFilters(names){
  const wrap=document.getElementById('sprintFilters');
  wrap.innerHTML='';
  const mk=(val,lbl)=>{
    const b=document.createElement('button');
    b.className='sprint-btn'+(activeFilters.has(val)?' active':'');
    b.dataset.sprint=val;b.textContent=lbl;
    b.addEventListener('click',()=>toggleFilter(val));
    wrap.appendChild(b);
  };
  mk('ALL','Todas');names.forEach(n=>mk(n,n));
}

function toggleFilter(sprint){
  if(sprint==='ALL'){activeFilters=new Set(['ALL'])}
  else{
    activeFilters.delete('ALL');
    activeFilters.has(sprint)?activeFilters.delete(sprint):activeFilters.add(sprint);
    if(!activeFilters.size) activeFilters.add('ALL');
  }
  document.querySelectorAll('.sprint-btn').forEach(b=>b.classList.toggle('active',activeFilters.has(b.dataset.sprint)));
  document.querySelectorAll('.sprint-block').forEach(b=>b.classList.toggle('hidden',!activeFilters.has('ALL')&&!activeFilters.has(b.dataset.sprint)));
}

  sprintData.forEach(({sprint,tasks})=>{
    if(!tasks.length) return;

    // Agrupar por dev
    const devMap={};

      const dev=t.quem||'Não atribuído';
      if(!devMap[dev]) devMap[dev]=[];
      devMap[dev].push(t);

/* ═══════════════════════════════════════════════
   LOAD

async function loadData(){
  const board=document.getElementById('board');
  const btn=document.getElementById('reloadBtn');
  board.innerHTML='<div class="state-overlay"><div class="spinner"></div><span>Buscando dados da planilha…</span><span class="load-status" style="font-size:10.5px;color:var(--text-muted);margin-top:4px"></span></div>';
  document.getElementById('sprintFilters').innerHTML='';
  activeFilters=new Set(['ALL']);
  unknownStatuses.clear();
  if(btn){btn.disabled=true;btn.textContent='⏳ Carregando…'}

  try{
    const {text}=await fetchCSV();
    const rows=parseCSV(text);
    if(rows.length<2) throw new Error('Planilha retornou vazia. Verifique se está publicada.');

    const headers=rows[0].map(h=>h.trim());
    const idx=(...names)=>{
      for(const n of names){
        const i=headers.findIndex(h=>h.toLowerCase().includes(n.toLowerCase()));
        if(i>=0) return i;
      }
      return -1;
    };

    const iC=idx('cliente'),iP=idx('projeto'),iL=idx('task','link'),
          iT=idx('título','titulo','title'),iS=idx('status'),
          iQ=idx('quem','responsável','responsavel'),iSp=idx('sprint'),
          iE=idx('entrega','data'),iO=idx('obs','observ');

    const get=(cells,i)=>i>=0?clean(cells[i]):'';

    const allTasks=rows.slice(1)
      .map(cells=>({
        cliente:get(cells,iC),projeto:get(cells,iP),link:get(cells,iL),
        titulo:get(cells,iT),status:get(cells,iS),quem:get(cells,iQ),
        sprint:get(cells,iSp),entrega:get(cells,iE),obs:get(cells,iO),
      }))
      .filter(t=>t.sprint.length>0);

    if(!allTasks.length)
      throw new Error('Nenhuma linha com Sprint preenchido.\nCabeçalhos: '+headers.slice(0,8).join(', '));

    const sprintMap={};
    allTasks.forEach(t=>{if(!sprintMap[t.sprint])sprintMap[t.sprint]=[];sprintMap[t.sprint].push(t)});

    const sprintData=SPRINT_CONFIG.map(cfg=>({sprint:cfg,tasks:sprintMap[cfg.name]||[]}));

    if(!sprintData.some(s=>s.tasks.length)){
      const found=Object.keys(sprintMap).slice(0,5).join(', ')||'nenhum';
      throw new Error(`Nenhuma tarefa para Sprint 14/15/16.\nEncontrado: ${found}`);
    }

    buildBoard(sprintData);
    const now=new Date();
    document.getElementById('lastUpdated').textContent=
      'Atualizado: '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  }catch(err){
    console.error(err);
    board.innerHTML=`
      <div class="state-overlay">
        <div class="error-box">
          <h3>⚠️ Não foi possível carregar os dados</h3>
          <p>${err.message.replace(/\n/g,'<br>')}</p>
          <div style="border-top:1px solid var(--border);margin:12px 0"></div>
          <p style="font-weight:600;font-size:12.5px;color:#1a1d23;margin-bottom:8px">Como publicar a planilha:</p>
          <div class="error-step"><div class="error-step-n">1</div><span>Abra a planilha no Google Sheets</span></div>
          <div class="error-step"><div class="error-step-n">2</div><span><strong>Arquivo → Compartilhar → Publicar na Web</strong></span></div>
          <div class="error-step"><div class="error-step-n">3</div><span>Selecione <strong>Documento inteiro</strong> + <strong>CSV (.csv)</strong></span></div>
          <div class="error-step"><div class="error-step-n">4</div><span>Clique <strong>Publicar</strong> e aguarde ~2 min</span></div>
          <p style="margin-top:10px;font-size:11px;color:#9099a8">URL: <code>${CSV_URL}</code></p>
          <button class="retry-btn" onclick="loadData()">↺ Tentar novamente</button>
        </div>
      </div>`;
  }finally{
    if(btn){btn.disabled=false;btn.textContent='↺ Atualizar'}
  }
}

loadData();
</script>
</body>
</html>
